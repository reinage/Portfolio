<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nebula Fine Art</title>

  <link rel="stylesheet" href="style.css">

  <script src="js/jquery.min.1.7.js"></script>
  <script src="js/turn.js"></script>
  <script src="script.js"></script>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h1>Nebula<br>Fine Art</h1>
</div>

<!-- MAIN -->
<div class="content">

  <!-- SHELF -->
  <div id="shelf">
6:08 6:09
    <div class="book" data-book="book1">
      <img src="DTESzine/DTES0.png">
    </div>

    <div class="book" data-book="book2">
      <img src="DTESzine/DTES2.png">
    </div>

  </div>

  <!-- BOOK STAGE -->
  <div id="book-container">

    <!-- UI OVERLAY -->
    <div class="book-ui">
      <button id="previous" class="nav-btn left">‹</button>
      <button id="next" class="nav-btn right">›</button>
      <button id="close-book" class="close-btn">✕</button>
    </div>

    <!-- BOOK 1 -->
    <div class="book-instance" id="book1">
      <div class="flipbook">
        <div class="page" style="background-image:url('DTESzine/DTES0.png')"></div>
        <div class="page" style="background-image:url('DTESzine/DTES1.png')"></div>
        <div class="page" style="background-image:url('DTESzine/DTES2.png')"></div>
        <div class="page" style="background-image:url('DTESzine/DTES3.png')"></div>
      </div>
    </div>

    <!-- BOOK 2 -->
    <div class="book-instance" id="book2">
      <div class="flipbook">
        <div class="page" style="background-image:url('DTESzine/DTES2.png')"></div>
        <div class="page" style="background-image:url('DTESzine/DTES3.png')"></div>
        <div class="page" style="background-image:url('DTESzine/DTES4.png')"></div>
      </div>
    </div>

  </div>

</div>

</body>
</html>
