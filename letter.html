<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nebula Fine Art</title>

  <link rel="stylesheet" href="style.css">

  <script src="js/jquery.min.1.7.js"></script>
  <script src="js/turn.js"></script>
  <script src="script.js" defer></script>
</head>

<body>


<div class="content nosidebarpls">

  <!-- FLIPBOOK STAGE  -->
  <div class="flipbook-stage">

    <!-- UI OVERLAY -->
    <div class="book-ui">

      <button class="nav-btn prev"
        onclick="$('#flipbook').turn('previous')">
        ‹
      </button>

      <button class="nav-btn next"
        onclick="$('#flipbook').turn('next')">
        ›
      </button>

      <button class="close-btn"
        onclick="goBack()">
        ✕
      </button>

    </div>   <!--UI -->

    <!-- FLIPBOOK -->
    <div id="flipbook">
  <div class="page" style="background-image:url('letter/letter0.png')"></div>
  <div class="page" style="background-image:url('letter/letter1.png')"></div>
  <div class="page" style="background-image:url('letter/letter2.png')"></div>
  <div class="page" style="background-image:url('letter/letter3.png')"></div>
  <div class="page" style="background-image:url('letter/letter4.png')"></div>
  <div class="page" style="background-image:url('letter/letter5.png')"></div>
  <div class="page" style="background-image:url('letter/letter6.png')"></div>
  <div class="page" style="background-image:url('letter/letter7.png')"></div>
  <div class="page" style="background-image:url('letter/letter8.png')"></div>
  <div class="page" style="background-image:url('letter/letter9.png')"></div>
  <div class="page" style="background-image:url('letter/letter10.png')"></div>
  <div class="page" style="background-image:url('letter/letter11.png')"></div>

</div>    <!--flipbook -->
</div>    <!--flipbook stage -->

</div>    <!-- content -->

</body>
</html>
