<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nebula Fine Art</title>

  <link rel="stylesheet" href="style.css">

  <script src="js/jquery.min.1.7.js"></script>
  <script src="js/turn.js"></script>
  <script src="script.js" defer></script>
</head>

<body>


    <div class="content">
  <!-- FLIPBOOK STAGE (IMPORTANT WRAPPER) -->
  <div class="flipbook-stage">

    <!-- UI OVERLAY -->
    <div class="book-ui">

      <button class="nav-btn prev"
        onclick="$('#flipbook').turn('previous')">
        ‹
      </button>

      <button class="nav-btn next"
        onclick="$('#flipbook').turn('next')">
        ›
      </button>

      <button class="close-btn"
        onclick="goBack()">
        ✕
      </button>

    </div> <!-- UI -->
    <!-- FLIPBOOK -->
    <div id="flipbook">
 
      
      <div class="page" style="background-image:url('spark/spark (1).png')"></div>
      <div class="page" style="background-image:url('spark/spark (2).png')"></div>
      <div class="page" style="background-image:url('spark/spark (3).png')"></div>
      <div class="page" style="background-image:url('spark/spark (4).png')"></div>
      <div class="page" style="background-image:url('spark/spark (5).png')"></div>
      <div class="page" style="background-image:url('spark/spark (6).png')"></div>
      <div class="page" style="background-image:url('spark/spark (7).png')"></div>
      <div class="page" style="background-image:url('spark/spark (8).png')"></div>
      <div class="page" style="background-image:url('spark/spark (9).png')"></div>
      <div class="page" style="background-image:url('spark/spark (10).png')"></div>
      <div class="page" style="background-image:url('spark/spark (11).png')"></div>
      <div class="page" style="background-image:url('spark/spark (12).png')"></div>
      <div class="page" style="background-image:url('spark/spark (13).png')"></div>
      <div class="page" style="background-image:url('spark/spark (14).png')"></div>
      <div class="page" style="background-image:url('spark/spark (15).png')"></div>
      <div class="page" style="background-image:url('spark/spark (16).png')"></div>
      <div class="page" style="background-image:url('spark/spark (17).png')"></div>
      <div class="page" style="background-image:url('spark/spark (18).png')"></div>
    </div>  <!-- flipbook -->


</div> <!-- flipbook stage -->
</div> <!-- content-->

</body>
</html>
